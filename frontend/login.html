<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OVEC SOC Login</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="checkin-body">
    <div class="step active">
        <div class="card" style="max-width:400px;margin:0 auto;">
            <div class="logo-header">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0110 0v4"/>
                    </svg>
                </div>
                <h1>OVEC SOC Login</h1>
                <p class="subtitle">NCEMC Site Visit System</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter SOC password" autofocus>
                </div>
                <div id="login-error" class="form-msg error" style="min-height:1.5em"></div>
                <button type="submit" class="btn btn-primary full-width" id="btn-login">Log In</button>
            </form>

            <p style="text-align:center;margin-top:20px">
                <a href="/" class="btn btn-link">Back to Check-In</a>
            </p>
        </div>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/api.js"></script>
    <script>
    (function() {
        if (api.isLoggedIn()) {
            const params = new URLSearchParams(window.location.search);
            window.location.href = params.get('next') || '/dashboard.html';
            return;
        }

        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-login');
            const err = document.getElementById('login-error');
            btn.disabled = true;
            btn.textContent = 'Logging in...';
            err.textContent = '';

            fetch(window.API_URL + '/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: document.getElementById('password').value }),
            })
            .then(r => r.json())
            .then(data => {
                if (data.success && data.token) {
                    api.setToken(data.token);
                    const params = new URLSearchParams(window.location.search);
                    window.location.href = params.get('next') || '/dashboard.html';
                } else {
                    err.textContent = data.error || 'Login failed';
                    btn.disabled = false;
                    btn.textContent = 'Log In';
                }
            })
            .catch(() => {
                err.textContent = 'Connection error';
                btn.disabled = false;
                btn.textContent = 'Log In';
            });
        });
    })();
    </script>
</body>
</html>
